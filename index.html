                <p style="color:#8e9fb1;font-size:13px;margin-bottom:8px;">Выберите пользователя для блокировки в группе:</p>
                <select id="blockUserSelect" style="width:100%;padding:8px;margin-bottom:8px;background:#1f2c38;border:none;border-radius:8px;color:#fff;">
                    ${users.map(u => `<option value="${u}">${u}</option>`).join('')}
                </select>
                <button class="btn-danger" id="confirmBlockUserBtn">🚫 Заблокировать</button>
                <button class="btn-secondary" onclick="closeModal()">Отмена</button>
                <div style="margin-top:12px;color:#8e9fb1;font-size:12px;">
                    Заблокированные: ${state.blockedUsers.join(', ') || 'нет'}
                </div>
                ${state.blockedUsers.length ? `
                    <button class="btn-secondary" id="unblockUserBtn" style="margin-top:4px;">Разблокировать</button>
                ` : ''}
            `);
            document.getElementById('confirmBlockUserBtn')?.addEventListener('click', () => {
                const name = document.getElementById('blockUserSelect').value;
                if (name && !state.blockedUsers.includes(name)) {
                    state.blockedUsers.push(name);
                    saveState();
                    addSystemMessage(chatId, `🚫 ${name} заблокирован в группе`);
                    closeModal();
                    renderChatList();
                }
            });
            document.getElementById('unblockUserBtn')?.addEventListener('click', () => {
                const name = prompt('Введите имя для разблокировки:');
                if (name && state.blockedUsers.includes(name)) {
                    state.blockedUsers = state.blockedUsers.filter(b => b !== name);
                    saveState();
                    addSystemMessage(chatId, `✅ ${name} разблокирован`);
                    closeModal();
                    renderChatList();
                }
            });
        }

        // ======== ДОБАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯ В ГРУППУ ========
        function showAddUserModal() {
            const chat = getChat(state.currentChatId);
            if (!chat || chat.type !== 'group') {
                alert('❌ Только для групп');
                return;
            }
            const participants = chat.participants || [];
            const availableUsers = state.allUsers.filter(u => 
                u.id !== state.user?.id && 
                !participants.includes(u.id) &&
                !isUserBlocked(u.name)
            );
            if (!availableUsers.length) {
                alert('❌ Нет доступных пользователей для добавления');
                return;
            }
            openModal('➕ Добавить пользователя', `

                <div class="user-select-list">
                    ${availableUsers.map(u => `
                        <div class="user-item">
                            <span>👤 ${u.name}</span>
                            <button class="add-user-btn" data-id="${u.id}" data-name="${u.name}">➕ Добавить</button>
                        </div>

                </div>
                <button class="btn-secondary" onclick="closeModal()">Закрыть</button>

                        chat.participants.push(userId);

                        renderChatList();
                        updateChatHeader();

        // ======== CHAT SETTINGS ========
        function showChatSettings() {
            const chat = getChat(state.currentChatId);
            if (!chat) return;
            const isCreator = chat.creator === state.user?.id;
            const participants = chat.participants || [];
            openModal('⚙️ Настройки чата', `

                        <label class="modal-label">Название</label>
                        <input type="text" id="editChatName" value="${chat.name}" />
                    </div>
                    <div style="margin-bottom:12px;">
                        <label class="modal-label">Описание</label>
                        <textarea id="editChatDesc">${chat.description || ''}</textarea>
                    </div>
                    <button class="btn-primary" id="saveChatSettingsBtn">💾 Сохранить</button>
                    <hr style="border-color:#2b3b4a;margin:12px 0;">

                ` : `
                    <p style="color:#8e9fb1;font-size:13px;">Только создатель может изменять настройки</p>

                `}
                ${chat.type === 'group' ? `
                    <hr style="border-color:#2b3b4a;margin:12px 0;">
                    <div style="color:#8e9fb1;font-size:12px;">
                        <strong>Участники (${participants.length}):</strong><br>
                        ${participants.map(id => {
                            const u = state.allUsers.find(a => a.id === id);
                            return u ? u.name : id;
                        }).join(', ')}
                    </div>
                    ${isCreator ? `
                        <button class="btn-primary" id="addUserSettingsBtn" style="margin-top:8px;">➕ Добавить участника</button>

                    const desc = document.getElementById('editChatDesc').value.trim();
                    if (name) {
                        chat.name = name;
                        chat.description = desc;

                        renderChatList();
                        updateChatHeader();

                        alert('✅ Изменения сохранены');

                });
                document.getElementById('deleteChatSettingsBtn')?.addEventListener('click', () => {

                document.getElementById('addUserSettingsBtn')?.addEventListener('click', () => {
                    closeModal();

        // ======== CREATE CHAT ========
        function createChat(type, name, participants, creator, isPrivate, description) {
            const chat = {
                id: generateId(),
                name: name || 'Чат',
                type: type || 'chat',
                participants: participants || [creator],
                creator: creator || state.user?.id,
                isPrivate: isPrivate || false,
                description: description || '',
                messages: [],
                pinnedMessages: [],
                created: Date.now(),
                isBlocked: false,
                avatar: null,
                avatarColor: type === 'channel' ? '#f39c12' : type === 'group' ? '#2ecc71' : '#2b5278'
            };
            state.chats.push(chat);
            if (type === 'chat' && participants.length === 2) {
                const otherId = participants.find(id => id !== creator);
                const other = state.allUsers.find(u => u.id === otherId);
                if (other) chat.name = other.name;
            }
            saveState();
            renderChatList();
            if (type === 'channel') {
                addSystemMessage(chat.id, `📢 Канал "${chat.name}" создан!`);
            } else if (type === 'group') {
                addSystemMessage(chat.id, `👥 Группа "${chat.name}" создана! Участников: ${participants.length}`);
            }
            return chat;
        }

        // ======== OPEN/CLOSE CHAT ========
        function openChat(chatId) {
            const chat = getChat(chatId);
            if (!chat || chat.isBlocked) {
                alert('🚫 Этот чат заблокирован');
                return;
            }
            state.currentChatId = chatId;
            document.getElementById('chatView').classList.add('open');
            renderMessages();
            updateChatHeader();
            saveState();
        }

        function closeChat() {
            document.getElementById('chatView').classList.remove('open');
            state.currentChatId = null;
            saveState();
            renderChatList();
        }

        function updateChatHeader() {
            const chat = getChat(state.currentChatId);
            if (!chat) return;
            document.getElementById('cvAvatar').textContent = chat.avatar || chat.name.charAt(0).toUpperCase() || '?';
            document.getElementById('cvName').innerHTML = getChatName(chat) + ` <button class="desc-btn" id="descBtn" title="Описание">ℹ️</button>`;
            document.getElementById('cvStatus').textContent = chat.type === 'channel' ? '📢 Канал' : chat.type === 'group' ? `👥 Группа (${(chat.participants || []).length} уч.)` : 'онлайн';
            document.getElementById('descBtn')?.addEventListener('click', () => {
                openModal('ℹ️ Описание', `
                    <p style="color:#e1e9f0;font-size:14px;margin-bottom:8px;">${chat.description || 'Нет описания'}</p>
                    <p style="color:#8e9fb1;font-size:12px;">Тип: ${chat.type === 'channel' ? 'Канал' : chat.type === 'group' ? 'Группа' : 'Чат'}</p>
                    <p style="color:#8e9fb1;font-size:12px;">Создан: ${new Date(chat.created).toLocaleDateString()}</p>
                    <p style="color:#8e9fb1;font-size:12px;">Участников: ${(chat.participants || []).length}</p>
                    <button class="btn-secondary" onclick="closeModal()">Закрыть</button>
                `);
            });
            const addBtn = document.getElementById('addUserBtn');
            if (addBtn) {
                addBtn.style.display = chat.type === 'group' && chat.creator === state.user?.id ? 'inline-block' : 'none';
            }
            const input = document.getElementById('messageInput');
            input.disabled = isChatBlocked(chat.id);
            input.placeholder = isChatBlocked(chat.id) ? '🚫 Чат заблокирован' : 'Сообщение...';
        }

        // ======== MESSAGING ========
        function sendMessage(text, videoData, isCircle, fileData, audioData) {
            const chat = getChat(state.currentChatId);
            if (!chat || isChatBlocked(chat.id)) return;
            if (!text && !videoData && !fileData && !audioData) return;
            const msg = {
                id: generateId(),
                sender: state.user.id,
                text: text || '',
                video: videoData || null,
                file: fileData || null,
                audio: audioData || null,
                isCircle: isCircle || false,
                isBot: false,
                isSystem: false,
                time: Date.now()
            };
            chat.messages.push(msg);
            saveState();
            renderMessages();
            renderChatList();
            if (chat.isBot && text && state.bot) {
                setTimeout(() => {
                    const response = state.bot.getResponse(text, chat.id);
                    if (response) {
                        const botMsg = {
                            id: generateId(),
                            sender: 'bot',
                            text: response,
                            time: Date.now(),
                            isBot: true,
                            isSystem: false
                        };
                        chat.messages.push(botMsg);
                        saveState();
                        renderMessages();
                        renderChatList();
                    }
                }, 500);
            }
        }

        // ======== VOICE RECORDING ========
        function startVoiceRecording() {
            if (state.isRecording) return;
            const voiceBar = document.getElementById('voiceRecordBar');
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    state.mediaRecorder = new MediaRecorder(stream);
                    state.audioChunks = [];
                    state.isRecording = true;
                    state.recordingSeconds = 0;
                    state.mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) state.audioChunks.push(e.data);
                    };
                    state.mediaRecorder.onstop = () => {
                        const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const audioData = {
                                data: ev.target.result,
                                duration: state.recordingSeconds,
                            };
                            sendMessage(null, null, false, null, audioData);
                            state.audioChunks = [];
                            state.isRecording = false;
                            voiceBar.classList.remove('show');
                            document.getElementById('voiceTimer').textContent = '0:00';
                            clearInterval(state.recordingTimer);
                            stream.getTracks().forEach(t => t.stop());
                        };
                        reader.readAsDataURL(blob);
                    };
                    state.mediaRecorder.start();
                    voiceBar.classList.add('show');
                    clearInterval(state.recordingTimer);
                    state.recordingTimer = setInterval(() => {
                        state.recordingSeconds++;
                        document.getElementById('voiceTimer').textContent = formatDuration(state.recordingSeconds);
                    }, 1000);
                })
                .catch(err => {
                    alert('❌ Ошибка доступа к микрофону: ' + err.message);
                });
        }

        function stopVoiceRecording() {
            if (state.mediaRecorder && state.isRecording) {
                state.mediaRecorder.stop();
            }
        }

        function cancelVoiceRecording() {
            if (state.mediaRecorder && state.isRecording) {
                state.mediaRecorder.stop();
                state.audioChunks = [];
                state.isRecording = false;
                document.getElementById('voiceRecordBar').classList.remove('show');
                document.getElementById('voiceTimer').textContent = '0:00';
                clearInterval(state.recordingTimer);
            }
        }

        // ======== CIRCLE RECORDING ========
        function startCircleRecording() {
            const preview = document.getElementById('circlePreview');
            const recorderDiv = document.getElementById('circleRecorder');
            const startBtn = document.getElementById('circleStartBtn');
            const stopBtn = document.getElementById('circleStopBtn');
            const timerEl = document.getElementById('circleTimer');

            recorderDiv.style.display = 'block';
            document.getElementById('inputRow').style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    state.circleStream = stream;
                    preview.srcObject = stream;
                    preview.play();
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    timerEl.textContent = '0 сек';
                    state.circleSeconds = 0;
                    state.circleChunks = [];

                    startBtn.onclick = () => {
                        if (!state.circleStream) return;
                        state.circleChunks = [];
                        const recorder = new MediaRecorder(state.circleStream, { mimeType: 'video/webm' });
                        state.circleRecorder = recorder;
                        recorder.ondataavailable = (e) => {
                            if (e.data.size > 0) state.circleChunks.push(e.data);
                        };
                        recorder.onstop = () => {
                            const blob = new Blob(state.circleChunks, { type: 'video/webm' });
                            if (blob.size > 0) {
                                const reader = new FileReader();
                                reader.onload = (ev) => {
                                    sendMessage(null, ev.target.result, true, null, null);
                                    closeCircleRecorder();
                                };
                                reader.readAsDataURL(blob);
                            } else {
                                alert('Запись не удалась');
                                closeCircleRecorder();
                            }
                            state.circleChunks = [];
                        };
                        recorder.start(1000);
                        startBtn.disabled = true;
                        stopBtn.disabled = false;
                        state.circleSeconds = 0;
                        clearInterval(state.circleTimer);
                        state.circleTimer = setInterval(() => {
                            state.circleSeconds++;
                            timerEl.textContent = state.circleSeconds + ' сек';
                            if (state.circleSeconds >= 5) stopCircleRecording();
                        }, 1000);
                    };

                    stopBtn.onclick = stopCircleRecording;
                    document.getElementById('circleCancelBtn').onclick = closeCircleRecorder;
                })
                .catch(err => {
                    alert('❌ Ошибка доступа к камере: ' + err.message);
                    closeCircleRecorder();
                });
        }

        function stopCircleRecording() {
            if (state.circleRecorder && state.circleRecorder.state !== 'inactive') {
                state.circleRecorder.stop();
            }
            clearInterval(state.circleTimer);
            document.getElementById('circleTimer').textContent = '⏹';
        }

        function closeCircleRecorder() {
            clearInterval(state.circleTimer);
            if (state.circleStream) {
                state.circleStream.getTracks().forEach(t => t.stop());
                state.circleStream = null;
            }
            if (state.circleRecorder) {
                try { state.circleRecorder.stop(); } catch (e) {}
                state.circleRecorder = null;
            }
            document.getElementById('circleRecorder').style.display = 'none';
            document.getElementById('inputRow').style.display = 'flex';
            document.getElementById('circlePreview').srcObject = null;
            state.circleChunks = [];
        }

        // ======== FILE HANDLING ========
        function handleFileSelect(file) {
            if (!file) return;
            if (file.size > 50 * 1024 * 1024) {
                alert('Файл слишком большой! Максимум 50MB');
                return;
            }
            state.pendingFile = file;
            const bar = document.getElementById('filePreviewBar');
            bar.classList.add('show');
            document.getElementById('filePreviewIcon').textContent = getFileIcon(file.name);
            document.getElementById('filePreviewName').textContent = file.name;
            document.getElementById('filePreviewSize').textContent = formatFileSize(file.size);
        }

        function clearFilePreview() {
            state.pendingFile = null;
            document.getElementById('filePreviewBar').classList.remove('show');
            document.getElementById('fileInput').value = '';
        }

        function sendFileMessage() {
            if (!state.pendingFile) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const fileData = {
                    name: state.pendingFile.name,
                    size: state.pendingFile.size,
                    type: state.pendingFile.type,
                    data: e.target.result,
                };
                const text = document.getElementById('messageInput').value.trim();
                sendMessage(text, null, false, fileData, null);
                document.getElementById('messageInput').value = '';
                clearFilePreview();
            };
            reader.readAsDataURL(state.pendingFile);
        }

        function handleCamera() {
            document.getElementById('cameraInput').click();
        }

        function handleVideoUpload() {
            document.getElementById('videoFileInput').click();
        }

        // ======== AUTH ========
        function loginWithPassword() {
            const name = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            if (!name || !password) {
                errorEl.textContent = 'Введите имя и пароль';
                errorEl.classList.remove('hidden');
                return;
            }
            if (isUserBlocked(name)) {
                errorEl.textContent = '❌ Этот пользователь заблокирован';
                errorEl.classList.remove('hidden');
                return;
            }
            let user = state.allUsers.find(u => u.name === name && u.password === password);
            if (!user) {
                user = {
                    id: generateId(),
                    name: name,
                    email: name + '@user.com',
                    password: password
                };
                state.allUsers.push(user);
            }
            state.user = user;
            state.bot = new SimpleBot();
            state.bot.setUserName(name);
            const botChat = {
                id: generateId(),
                type: 'chat',
                name: 'Tlim Bot',
                avatar: '🤖',
                avatarColor: '#1a5276',
                participants: [user.id, 'bot'],
                creator: 'bot',
                isBot: true,
                messages: [{
                    id: 'bot_welcome',
                    sender: 'bot',
                    text: `👋 Привет, ${name}! Я бот Tlim. Приятно познакомиться!`,
                    time: Date.now(),
                    isBot: true,
                    isSystem: false
                }],
                pinnedMessages: [],
                description: 'Официальный бот Tlim',
                isPrivate: false,
                isBlocked: false,
                created: Date.now()
            };
            state.chats = [botChat];
            state.botChatId = botChat.id;
            saveState();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            renderChatList();
            errorEl.classList.add('hidden');
        }

        function logout() {
            state.user = null;
            state.currentChatId = null;
            closeChat();
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            localStorage.removeItem('tlimUser');
            saveState();
        }

        // ======== MODAL ========

            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');

        // ======== SETTINGS ========
        function showSettings() {
            openModal('⚙️ Настройки', `
                <div style="margin-bottom:12px;">
                    <label class="modal-label">Ваше имя</label>
                    <input type="text" id="settingsUsername" value="${state.user?.name || ''}" />
                </div>
                <div style="margin-bottom:12px;">
                    <label class="modal-label">Подтверждение паролем</label>
                    <input type="password" id="settingsPassword" placeholder="Введите пароль" />
                </div>
                <button class="btn-primary" id="saveSettingsBtn">💾 Сохранить имя</button>
                <hr style="border-color:#2b3b4a;margin:12px 0;">
                <div style="color:#8e9fb1;font-size:13px;margin-bottom:8px;">🚫 Заблокированные:</div>
                <div class="blocked-users-list">
                    ${state.blockedUsers.length ? state.blockedUsers.map(name => `
                        <div class="blocked-user">
                            <span>${name}</span>
                            <button class="unblock-btn" data-name="${name}">Разблокировать</button>
                        </div>
                    `).join('') : '<div style="color:#6b7f8f;font-size:12px;">Нет заблокированных</div>'}
                </div>
                <button class="btn-secondary" onclick="closeModal()">Закрыть</button>
            `);
            document.getElementById('saveSettingsBtn')?.addEventListener('click', () => {
                const name = document.getElementById('settingsUsername').value.trim();
                const password = document.getElementById('settingsPassword').value.trim();
                if (!name) { alert('Введите имя'); return; }
                if (!password) { alert('Введите пароль для подтверждения'); return; }
                if (state.user && state.user.password !== password) {
                    alert('❌ Неверный пароль');
                    return;
                }
                const oldName = state.user.name;
                state.user.name = name;
                state.chats.forEach(chat => {
                    if (chat.name === oldName) chat.name = name;
                });
                saveState();
                document.getElementById('userNameDisplay').textContent = name;
                closeModal();
                alert('✅ Имя изменено!');
                renderChatList();
                if (state.currentChatId) updateChatHeader();
            });
            document.querySelectorAll('.unblock-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const name = btn.dataset.name;
                    state.blockedUsers = state.blockedUsers.filter(b => b !== name);
                    saveState();
                    closeModal();
                    showSettings();
                    renderChatList();
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            if (state.user) {
                state.bot = new SimpleBot();
                state.bot.setUserName(state.user.name);

                document.getElementById('mainApp').style.display = 'flex';

                document.getElementById('passwordForm').style.display = 'block';
                document.getElementById('codeForm').style.display = 'none';
            });
            document.getElementById('tabCode').addEventListener('click', () => {
                document.querySelectorAll('.tab-buttons button').forEach(b => b.classList.remove('active'));
                document.getElementById('tabCode').classList.add('active');
                document.getElementById('passwordForm').style.display = 'none';
                document.getElementById('codeForm').style.display = 'block';
            });

            // Login

            document.getElementById('loginPassword').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') loginWithPassword();
            });
            document.getElementById('togglePassword').addEventListener('click', () => {
                const inp = document.getElementById('loginPassword');
                inp.type = inp.type === 'password' ? 'text' : 'password';
            });

            // Register
            document.getElementById('registerBtn').addEventListener('click', () => {
                const name = document.getElementById('regUsername').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const password = document.getElementById('regPassword').value.trim();
                const err = document.getElementById('codeError');
                if (!name || !email || !password) {
                    err.textContent = 'Заполните все поля';
                    err.classList.remove('hidden');
                    return;
                }
                if (state.allUsers.find(u => u.name === name)) {
                    err.textContent = 'Имя уже занято';
                    err.classList.remove('hidden');
                    return;
                }
                err.classList.add('hidden');
                document.getElementById('codeSuccess').textContent = '✅ Регистрация успешна! Войдите в аккаунт.';
                document.getElementById('codeSuccess').classList.remove('hidden');
                document.getElementById('tabPassword').click();
                document.getElementById('loginUsername').value = name;
                document.getElementById('loginPassword').value = password;
            });

            // Logout
            document.getElementById('logoutBtn').addEventListener('click', logout);

            // Chat controls
            document.getElementById('backBtn').addEventListener('click', closeChat);
            document.getElementById('chatsBtn').addEventListener('click', () => {
                document.getElementById('chatsBtn').classList.add('active');
                closeChat();
            });

            // Search
            const searchInput = document.getElementById('globalSearchInput');
            searchInput.addEventListener('input', (e) => performGlobalSearch(e.target.value.trim()));
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-wrap')) {
                    document.getElementById('searchResults').classList.remove('show');
                }
            });

            // Create buttons
            document.getElementById('createChannelBtn').addEventListener('click', () => {
                const name = prompt('Название канала:');
                if (name) {
                    const chat = createChat('channel', name, [state.user.id], state.user.id, false, 'Канал');
                    if (chat) openChat(chat.id);
                }
            });
            document.getElementById('createGroupBtn').addEventListener('click', () => {
                const name = prompt('Название группы:');
                if (name) {
                    const chat = createChat('group', name, [state.user.id], state.user.id, false, 'Группа');
                    if (chat) openChat(chat.id);
                }
            });
            document.getElementById('createFolderBtn').addEventListener('click', () => {
                alert('📂 Папки пока в разработке');
            });
            document.getElementById('settingsBtn').addEventListener('click', showSettings);

            // Chat settings, invite, add user
            document.getElementById('chatSettingsBtn').addEventListener('click', showChatSettings);
            document.getElementById('chatInviteBtn').addEventListener('click', () => {
                if (state.currentChatId) showChatInvite(state.currentChatId);
            });
            document.getElementById('addUserBtn').addEventListener('click', showAddUserModal);

            // ===== FILE HANDLING EVENTS =====
            document.getElementById('fileBtn').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });
            document.getElementById('fileInput').addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleFileSelect(e.target.files[0]);
                }
            });
            document.getElementById('removeFileBtn').addEventListener('click', clearFilePreview);

            // Camera
            document.getElementById('cameraBtn').addEventListener('click', handleCamera);
            document.getElementById('cameraInput').addEventListener('change', (e) => {
                if (e.target.files.length) {
                    const file = e.target.files[0];
                    if (!file.type.startsWith('image/')) {
                        alert('Выберите изображение');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const fileData = {
                            name: file.name || 'photo.jpg',
                            size: file.size,
                            type: file.type,
                            data: ev.target.result,
                        };
                        sendMessage(null, null, false, fileData, null);
                    };
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            });

            // Video
            document.getElementById('videoBtn').addEventListener('click', handleVideoUpload);
            document.getElementById('videoFileInput').addEventListener('change', (e) => {
                if (e.target.files.length) {
                    const file = e.target.files[0];
                    if (!file.type.startsWith('video/')) {
                        alert('Выберите видео');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        sendMessage(null, ev.target.result, false, null, null);
                    };
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            });

            // Circle
            document.getElementById('circleBtn').addEventListener('click', startCircleRecording);

            // Voice
            let voicePressTimer = null;
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.addEventListener('mousedown', () => {
                voicePressTimer = setTimeout(startVoiceRecording, 300);
            });
            voiceBtn.addEventListener('mouseup', () => {
                clearTimeout(voicePressTimer);
                if (state.isRecording) stopVoiceRecording();
            });
            voiceBtn.addEventListener('mouseleave', () => {
                clearTimeout(voicePressTimer);
            });
            voiceBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                voicePressTimer = setTimeout(startVoiceRecording, 300);
            });
            voiceBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                clearTimeout(voicePressTimer);
                if (state.isRecording) stopVoiceRecording();
            });
            document.getElementById('voiceCancelBtn').addEventListener('click', cancelVoiceRecording);
            document.getElementById('voiceSendBtn').addEventListener('click', stopVoiceRecording);

            // Avatar
            document.getElementById('userAvatar').addEventListener('click', () => {
                document.getElementById('avatarInput').click();
            });
            document.getElementById('avatarInput').addEventListener('change', (e) => {
                if (e.target.files.length) {
                    const file = e.target.files[0];
                    if (!file.type.startsWith('image/')) {
                        alert('Выберите изображение');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        state.user.avatarImg = ev.target.result;
                        saveState();
                        document.getElementById('avatarText').textContent = '';
                        document.getElementById('userAvatar').innerHTML = '<img src="' + state.user.avatarImg + '" alt="avatar" />';
                    };
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            });

            // Send message
            function handleSend() {
                const input = document.getElementById('messageInput');
                if (state.pendingFile) {
                    sendFileMessage();
                } else if (input.value.trim()) {
                    sendMessage(input.value.trim());
                    input.value = '';
                }
            }
            document.getElementById('sendBtn').addEventListener('click', handleSend);
            document.getElementById('messageInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault();
                    handleSend(); }
            });

            // Modal close
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) closeModal();
            });

            // Auto-refresh
            setInterval(() => {
                if (state.currentChatId) {
                    const chat = getChat(state.currentChatId);
                    if (chat) renderMessages();
                }
                renderChatList();
            }, 3000);

            console.log('🚀 Tlim загружен!');
        });
    </script>
</body>
</html>
